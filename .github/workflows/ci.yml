name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install just
        uses: extractions/setup-just@v4

      - run: just check
